<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>For Steffi 🌸</title>
    <style>
        :root {
            --pink: #ff85a2;
            --blue: #7fb3d5;
            --dark-blue: #2c3e50;
        }

        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            overflow: hidden;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #fbcfe8, #dbeafe);
        }

        /* Container for the sliding pages */
        .wrapper {
            display: flex;
            width: 200vw; /* Two pages wide */
            height: 100vh;
            transition: transform 0.8s cubic-bezier(0.7, 0, 0.3, 1);
        }

        .page {
            width: 100vw;
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            position: relative;
        }

        /* Page 1 Styles */
        .page1 {
            background: radial-gradient(circle, #fff0f6, #fbcfe8);
        }

        .main-title {
            font-size: 3.5rem;
            color: #d81b60;
            margin: 0;
            animation: bounceIn 1.5s;
        }

        .date-text {
            font-size: 1.5rem;
            color: var(--blue);
            font-weight: bold;
            margin-bottom: 10px;
        }

        /* --- LOVE AGE COUNTER STYLE --- */
        #loveCounter {
            background: rgba(255, 255, 255, 0.5);
            padding: 10px 20px;
            border-radius: 15px;
            margin-bottom: 30px;
            font-family: 'Courier New', Courier, monospace;
            color: #d81b60;
            font-size: 0.9rem;
            line-height: 1.4;
            border: 1px dashed var(--pink);
        }

        /* Page 2 Styles */
        .page2 {
            background: radial-gradient(circle, #f0f7ff, #dbeafe);
        }

        .card {
            background: white;
            padding: 40px;
            border-radius: 30px;
            box-shadow: 0 15px 40px rgba(0,0,0,0.1);
            width: 85%;
            max-width: 400px;
            border: 2px solid var(--pink);
        }

        #displayBox {
            min-height: 120px;
            margin: 20px 0;
            font-size: 1.2rem;
            color: var(--dark-blue);
            display: flex;
            align-items: center;
            justify-content: center;
            font-style: italic;
        }

        /* Buttons and Animations */
        .action-btn {
            padding: 15px 35px;
            border: none;
            border-radius: 50px;
            font-size: 1.1rem;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }

        .btn-pink { background: var(--pink); color: white; }
        .btn-blue { background: var(--blue); color: white; }

        .action-btn:hover {
            transform: translateY(-5px) scale(1.05);
            box-shadow: 0 8px 20px rgba(0,0,0,0.2);
        }

        @keyframes bounceIn {
            0% { transform: scale(0.3); opacity: 0; }
            50% { transform: scale(1.05); }
            70% { transform: scale(0.9); }
            100% { transform: scale(1); opacity: 1; }
        }

        /* Confetti */
        .confetti {
            position: absolute;
            width: 10px;
            height: 10px;
            top: -10px;
            z-index: 100;
            animation: fall linear forwards;
        }

        @keyframes fall {
            to { transform: translateY(105vh) rotate(360deg); }
        }
    </style>
</head>
<body>

    <audio id="bdaySong" loop>
        <source src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3" type="audio/mpeg">
        </audio>

    <div class="wrapper" id="mainWrapper">
        
        <section class="page page1">
            <h1 class="main-title">Happy Birthday, Steffi! 🌸</h1>
            <p class="date-text">22 August 2005</p>
            
            <div id="loveCounter">Calculating your time in our world...</div>

            <p style="color: #666; max-width: 300px;">Today is all about you. Ready for your birthday blessings?</p>
            <button class="action-btn btn-pink" onclick="goToPage2()">Open Your Gift 🎁</button>
        </section>

        <section class="page page2">
            <div class="card">
                <h2 style="color: var(--blue);">For You, Steffi</h2>
                <div id="displayBox">Click a button below to see what the universe has for you today!</div>
                
                <div style="display: flex; gap: 10px; justify-content: center; flex-wrap: wrap;">
                    <button class="action-btn btn-pink" onclick="showMsg()">A Random Wish</button>
                    <button class="action-btn btn-blue" onclick="showVerse()">A Bible Verse</button>
                </div>
                <br>
                <button onclick="goToPage1()" style="background:none; border:none; color: #aaa; cursor:pointer;">← Go Back</button>
            </div>
        </section>

    </div>

    <script>
        // --- LIVE AGE COUNTER LOGIC ---
        const birthDate = new Date("August 22, 2005 00:00:00").getTime();

        function updateLoveCounter() {
            const now = new Date().getTime();
            const diff = now - birthDate;

            const years = Math.floor(diff / (1000 * 60 * 60 * 24 * 365.25));
            const days = Math.floor((diff % (1000 * 60 * 60 * 24 * 365.25)) / (1000 * 60 * 60 * 24));
            const hours = Math.floor((diff % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
            const mins = Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60));
            const secs = Math.floor((diff % (1000 * 60)) / 1000);

            document.getElementById("loveCounter").innerHTML = 
                `Steffi, you've been a blessing for:<br><strong>${years} Years, ${days} Days, ${hours}h, ${mins}m, ${secs}s</strong>`;
        }
        setInterval(updateLoveCounter, 1000);

        // --- NAVIGATION & MUSIC TRIGGER ---
        function goToPage2() {
            document.getElementById('mainWrapper').style.transform = 'translateX(-100vw)';
            // Plays the music when she clicks the button
            document.getElementById('bdaySong').play();
            createConfetti();
        }

        function goToPage1() {
            document.getElementById('mainWrapper').style.transform = 'translateX(0)';
        }

        const messages = [
            "Steffi, may your 20th year be filled with unexpected miracles!",
            "You are a masterpiece in progress. Happy Birthday, Steffi!",
            "May your day be painted in shades of pink and blue joy.",
            "Steffi, keep shining—the world needs your specific kind of light.",
            "Wishing you a year of laughter that makes your stomach hurt!"
        ];

        const verses = [
            "Psalm 20:4 - 'May He give you the desire of your heart.'",
            "Numbers 6:24 - 'The Lord bless you and keep you.'",
            "Jeremiah 29:11 - 'For I know the plans I have for you...'",
            "Zephaniah 3:17 - 'The Lord your God is in your midst, a mighty one who will save.'",
            "Psalm 139:14 - 'I praise you, for I am fearfully and wonderfully made.'"
        ];

        function showMsg() {
            const display = document.getElementById('displayBox');
            display.style.opacity = 0;
            setTimeout(() => {
                display.innerText = messages[Math.floor(Math.random() * messages.length)];
                display.style.opacity = 1;
            }, 200);
            createConfetti();
        }

        function showVerse() {
            const display = document.getElementById('displayBox');
            display.style.opacity = 0;
            setTimeout(() => {
                display.innerText = verses[Math.floor(Math.random() * verses.length)];
                display.style.opacity = 1;
            }, 200);
            createConfetti();
        }

        function createConfetti() {
            for (let i = 0; i < 40; i++) {
                const confetti = document.createElement('div');
                confetti.classList.add('confetti');
                confetti.style.left = Math.random() * 100 + 'vw';
                confetti.style.backgroundColor = Math.random() > 0.5 ? '#ff85a2' : '#7fb3d5';
                confetti.style.animationDuration = (Math.random() * 3 + 2) + 's';
                document.body.appendChild(confetti);
                setTimeout(() => confetti.remove(), 5000);
            }
        }
    </script>
</body>
</html>
